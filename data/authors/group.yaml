bio: |
  Welcome! We are a research group in the Department of Electrical, Computer, and Energy Engineering at the University of Colorado Boulder. We develop theory, algorithms, and computational tools for decision-making under uncertainty, integrating data-driven and model-based approaches at the interface of optimization and artificial intelligence. Our work focuses on scalable, reliable, and interpretable methods for energy systems, infrastructure networks, and large-scale decision-making.

